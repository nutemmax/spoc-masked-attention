experiment:
  save_root: results/individual
  run_name: null
  seed: 0

data:
  T: 4
  d: 50
  covariance_type: toeplitz
  rho: 0.9
  length_scale: null
  eta: null
  mask_value: 1.0
  masking_strategy: last

model:
  r: 50
  beta: 1.0
  normalize_sqrt_d: true
  dtype: float64
  device: cpu

training:
  alpha: 1.0
  n_steps: 100000
  learning_rate: 1e-2
  lambda_reg: 1e-5

evaluation:
  n_population: 10000

logging:
  use_wandb: true
  project: spoc-masked-attention